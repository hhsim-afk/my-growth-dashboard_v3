<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Dashboard</title>
    <!-- 폰트 로드 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/nanumbarungothic@master/nanumbarungothic.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- 필수 라이브러리 (최신 안정 버전) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Montserrat', 'NanumBarunGothic', sans-serif; background-color: #F0F2F5; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        input[type="number"], .font-montserrat { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>
    <div id="root">
        <!-- 로딩 화면 -->
        <div style="display:flex; height:100vh; justify-content:center; align-items:center; color:#00C39A; font-weight:bold;">
            대시보드 로딩 중...
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        // 에러 수정된 내장 SVG 아이콘 컴포넌트
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Plus: <path d="M12 5v14M5 12h14" />,
                Truck: <path d="M10 17h4V5H2v12h3m1 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0m10 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0M13 17h1m4-1h4V9l-3-4h-5v12h1" />,
                Zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                RotateCcw: <path d="M3 2v6h6m10.66 0a9 9 0 1 0-13.66 5.66" />,
                // 에러 발생 지점들 수정: 여러 요소를 <> </>로 감쌈
                Target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                LayoutGrid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
                ChevronRight: <path d="m9 18 6-6-6-6" />,
                Award: <><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/><circle cx="12" cy="8" r="6"/></>,
                Check: <path d="M20 6 9 17l-5-5" />,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                PlusCircle: <><circle cx="12" cy="12" r="10"/><path d="M8 12h8m-4-4v8"/></>,
                Calendar: <><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4m-5 4h18"/></>,
                Trash2: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6" />,
                ListTodo: <><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 11 2 2 4-4m-7 5h8"/></>,
                Archive: <><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8m-10 4h4"/></>,
                Clock: <><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>
            );
        };

        const App = () => {
            const [funnelData, setFunnelData] = useState({
                free: [
                    { id: 'f1', stage: '1회차', idea: '신규 가입 웰컴 쿠폰 발송', status: '진행 완료', period: '01.01~01.15' },
                    { id: 'f2', stage: '2회차', idea: '첫 이용 감사 포인트 지급', status: '진행 중', period: '03.01~03.20' }
                ],
                retention: [
                    { id: 'r1', stage: 'M1', idea: '첫 달 정기권 20% 할인', status: '진행 완료', period: '02.10~02.28' }
                ]
            });

            const [monthlyRecords, setMonthlyRecords] = useState([
                { id: 1, month: '2026-03', firstRequest: 840, free3rdCVR: '25.1%', m3Retention: '58.8%', status: '진행 중' }
            ]);

            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState('');
            const [editPeriod, setEditPeriod] = useState('');

            const updateStatus = (section, id) => {
                const cycle = ['대기', '진행 중', '진행 완료', '종료'];
                setFunnelData(prev => ({
                    ...prev,
                    [section]: prev[section].map(i => i.id === id ? {...i, status: cycle[(cycle.indexOf(i.status)+1)%4]} : i)
                }));
            };

            const saveIdea = (section, id) => {
                setFunnelData(prev => ({
                    ...prev,
                    [section]: prev[section].map(i => i.id === id ? {...i, idea: editValue, period: editPeriod} : i)
                }));
                setEditingId(null);
            };

            const addIdea = (section) => {
                const newId = Date.now().toString();
                setFunnelData(prev => ({
                    ...prev,
                    [section]: [...prev[section], { id: newId, stage: 'NEW', idea: '신규 전략', status: '대기', period: '기간 입력' }]
                }));
            };

            const updateMonthlyValue = (id, field, value) => {
                setMonthlyRecords(prev => prev.map(record => record.id === id ? { ...record, [field]: value } : record));
            };

            const totalReq = monthlyRecords.reduce((acc, curr) => acc + Number(curr.firstRequest || 0), 0);

            const Card = ({ section, item, isDark = false }) => (
                <div className={`p-4 rounded-3xl border transition-all relative ${isDark ? 'bg-slate-800 text-white border-slate-700' : 'bg-white border-gray-100 shadow-sm'}`}>
                    <div className="flex justify-between items-center mb-3">
                        <span className="text-[10px] font-bold opacity-50 uppercase tracking-tighter">{item.stage}</span>
                        <button onClick={() => updateStatus(section, item.id)} className={`text-[9px] px-2 py-0.5 rounded-full font-bold ${item.status === '종료' ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>{item.status}</button>
                    </div>
                    {editingId === item.id ? (
                        <div className="space-y-2">
                            <textarea autoFocus className="w-full text-xs p-2 rounded-lg bg-gray-50 text-gray-900 border-none focus:ring-1 focus:ring-emerald-500" value={editValue} onChange={e => setEditValue(e.target.value)} />
                            <input className="w-full text-[10px] p-1 rounded bg-gray-50 text-gray-900" value={editPeriod} onChange={e => setEditPeriod(e.target.value)} />
                            <button onClick={() => saveIdea(section, item.id)} className="w-full text-[10px] bg-emerald-500 text-white py-1 rounded-lg">저장</button>
                        </div>
                    ) : (
                        <div onClick={() => {setEditingId(item.id); setEditValue(item.idea); setEditPeriod(item.period);}} className="cursor-pointer">
                            <p className="text-xs font-bold mb-2 leading-tight h-8 overflow-hidden">{item.idea}</p>
                            <p className="text-[9px] opacity-40 flex items-center gap-1 font-montserrat"><Icon name="Clock" size={10}/> {item.period}</p>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen p-4 lg:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-2xl font-black text-slate-900">Growth Dashboard</h1>
                                <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-[0.3em]">Strategy Map v6.2</p>
                            </div>
                            <div className="bg-white px-6 py-3 rounded-2xl shadow-sm border border-white flex items-center gap-4">
                                <Icon name="Calendar" size={24} className="text-emerald-500" />
                                <div>
                                    <p className="text-[9px] font-bold text-gray-400">ACTIVE MONTH</p>
                                    <p className="text-lg font-black text-slate-800 font-montserrat">2026.03</p>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
                            <div className="bg-white/60 p-6 rounded-[2rem] border border-white flex flex-col justify-center items-center text-center">
                                <Icon name="Truck" size={36} className="text-emerald-500 mb-2" />
                                <h3 className="text-sm font-bold text-gray-600 font-nanum">첫 수거신청</h3>
                                <p className="text-3xl font-black text-emerald-600 font-montserrat">{totalReq.toLocaleString()}</p>
                            </div>
                            <div className="lg:col-span-3 bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black flex items-center gap-2 italic"><Icon name="Zap" className="text-emerald-500"/> 자유 이용 퍼널</h3>
                                    <span className="text-[10px] font-bold bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full">GOAL 25.6%</span>
                                </div>
                                <div className="grid grid-cols-3 gap-4">
                                    {funnelData.free.map(i => <Card key={i.id} section="free" item={i} />)}
                                    <button onClick={() => addIdea('free')} className="border-2 border-dashed border-gray-100 rounded-3xl h-24 flex items-center justify-center text-gray-300 hover:border-emerald-200 hover:text-emerald-400 transition-all">
                                        <Icon name="Plus" />
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="bg-slate-900 p-6 rounded-[2.5rem] shadow-xl mb-8">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-black text-white flex items-center gap-2 italic"><Icon name="RotateCcw" className="text-blue-400"/> 구독 리텐션 퍼널</h3>
                                <span className="text-[10px] font-bold bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full">GOAL M3 59%</span>
                            </div>
                            <div className="grid grid-cols-3 gap-4">
                                {funnelData.retention.map(i => <Card key={i.id} section="retention" item={i} isDark />)}
                                <button onClick={() => addIdea('retention')} className="border-2 border-dashed border-white/10 rounded-3xl h-24 flex items-center justify-center text-white/20 hover:border-blue-400 transition-all">
                                    <Icon name="Plus" />
                                </button>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100">
                            <h3 className="font-black mb-4 flex items-center gap-2"><Icon name="BarChart3" className="text-gray-400"/> 성과 아카이브</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead><tr className="text-[10px] text-gray-400 border-b border-gray-50"><th className="pb-3 px-4">진행 월</th><th className="pb-3 px-4 italic">첫 수거신청</th><th className="pb-3 px-4 italic">자유 3회차 CVR</th><th className="pb-3 px-4">상태</th></tr></thead>
                                    <tbody className="text-xs font-bold font-montserrat">
                                        {monthlyRecords.map(r => (
                                            <tr key={r.id} className="border-b border-gray-50 hover:bg-gray-50/50">
                                                <td className="py-4 px-4 text-gray-900">{r.month}</td>
                                                <td className="py-4 px-4 text-emerald-600">{r.firstRequest.toLocaleString()} 건</td>
                                                <td className="py-4 px-4 text-gray-800">{r.free3rdCVR}</td>
                                                <td className="py-4 px-4"><span className="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[9px] font-black tracking-tighter uppercase">{r.status}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
