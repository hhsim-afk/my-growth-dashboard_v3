<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Project Dashboard</title>
    <!-- 폰트 로드: 나눔바른고딕 & Montserrat -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/nanumbarungothic@master/nanumbarungothic.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- 필수 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 입력해주신 Firebase 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyBJ7XUp7d2_DM7MFTgYSbjyZbONiVqgGKM",
            authDomain: "laundrygo-growth-dashboard.firebaseapp.com",
            projectId: "laundrygo-growth-dashboard",
            storageBucket: "laundrygo-growth-dashboard.firebasestorage.app",
            messagingSenderId: "74880737977",
            appId: "1:74880737977:web:5b729b02693c995dff7168"
        };

        const appId = "laundrygo-growth-dashboard"; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FirebaseBridge = { db, auth, appId, doc, onSnapshot, setDoc, signInAnonymously };
    </script>

    <style>
        body { font-family: 'Montserrat', 'NanumBarunGothic', sans-serif; background-color: #F0F2F5; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        input[type="number"] { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 아이콘 (SVG)
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Plus: <path d="M12 5v14M5 12h14" />,
                Truck: <path d="M10 17h4V5H2v12h3m1 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0m10 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0M13 17h1m4-1h4V9l-3-4h-5v12h1" />,
                Zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                RotateCcw: <path d="M3 2v6h6m10.66 0a9 9 0 1 0-13.66 5.66" />,
                Target: <React.Fragment><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></React.Fragment>,
                LayoutGrid: <React.Fragment><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></React.Fragment>,
                ChevronRight: <path d="m9 18 6-6-6-6" />,
                Award: <React.Fragment><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/><circle cx="12" cy="8" r="6"/></React.Fragment>,
                Check: <path d="M20 6 9 17l-5-5" />,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                PlusCircle: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M8 12h8m-4-4v8"/></React.Fragment>,
                Calendar: <React.Fragment><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4m-5 4h18"/></React.Fragment>,
                Trash2: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6" />,
                ListTodo: <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 11 2 2 4-4m-7 5h8"/></React.Fragment>,
                Archive: <React.Fragment><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8m-10 4h4"/></React.Fragment>,
                Clock: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" /></React.Fragment>,
                BarChart3: <path d="M3 3v18h18m-12-4V9m4 8V5m4 12v-5" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>
            );
        };

        const FunnelCard = ({ section, item, isDark, onToggleStatus, onDelete, onStartEdit, isEditing, editValue, setEditValue, editPeriod, setEditPeriod, onSave }) => {
            const statusColors = { '대기': 'bg-gray-100 text-gray-500', '진행 중': 'bg-blue-100 text-blue-600', '진행 완료': 'bg-emerald-100 text-emerald-600', '종료': 'bg-rose-100 text-rose-600' };
            return (
                <div className={`p-5 rounded-[2.5rem] border transition-all flex flex-col justify-between group relative ${isDark ? 'bg-white/5 border-white/10 hover:border-blue-400/50 shadow-lg' : 'bg-white border-gray-100 shadow-lg hover:border-emerald-200'}`}>
                    <button onClick={() => onDelete(section, item.id)} className="absolute -top-2 -right-2 w-6 h-6 rounded-full shadow-md opacity-0 group-hover:opacity-100 z-20 bg-white text-gray-400 hover:text-rose-500 flex items-center justify-center"><Icon name="X" size={14} /></button>
                    <div>
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex flex-col">
                                <span className={`text-[11px] font-black uppercase tracking-widest ${section === 'retention' ? 'text-blue-300' : 'text-gray-400'}`}>{item.stage}</span>
                                {!isEditing && item.period && <span className={`text-[9px] font-bold flex items-center gap-1 mt-1 opacity-50`}><Icon name="Clock" size={10} /> {item.period}</span>}
                            </div>
                            <button onClick={() => onToggleStatus(section, item.id)} className={`text-[8px] px-2.5 py-1 rounded-full font-black ${statusColors[item.status]}`}>{item.status}</button>
                        </div>
                        {isEditing ? (
                            <div className="space-y-3 mb-4">
                                <textarea autoFocus className="w-full text-xs font-bold p-3 rounded-2xl bg-gray-50 text-gray-900 focus:outline-none focus:ring-2 ring-emerald-500" value={editValue} onChange={(e) => setEditValue(e.target.value)} rows="2" />
                                <input type="text" placeholder="진행 기간" className="w-full text-[10px] font-bold p-2 rounded-xl bg-gray-100 focus:outline-none" value={editPeriod} onChange={(e) => setEditPeriod(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && onSave(section, item.id)} />
                                <button onClick={() => onSave(section, item.id)} className="w-full py-1.5 bg-emerald-500 text-white rounded-xl text-[10px] font-bold">저장하기</button>
                            </div>
                        ) : (
                            <p className={`text-[13px] font-extrabold mb-5 leading-snug min-h-[3rem] cursor-pointer ${isDark ? 'text-white' : 'text-gray-800'}`} onClick={() => onStartEdit(item.id, item.idea, item.period)}>{item.idea || '클릭하여 내용 입력'}</p>
                        )}
                    </div>
                    {!isEditing && <button onClick={() => onStartEdit(item.id, item.idea, item.period)} className="w-full py-2 rounded-xl text-[9px] font-black text-gray-400 hover:text-emerald-500 flex items-center justify-center gap-1"><Icon name="Plus" size={12}/> 편집하기</button>}
                </div>
            );
        };

        const ProjectList = ({ title, items, badgeColor, isFinished = false }) => (
            <div className="mb-6 last:mb-0">
                <div className="flex items-center gap-2 mb-3">
                    <div className={`w-1.5 h-4 rounded-full ${badgeColor}`}></div>
                    <h4 className="text-[11px] font-black text-gray-400 uppercase tracking-widest">{title}</h4>
                </div>
                <div className="space-y-2">
                    {items.length > 0 ? items.map(p => (
                        <div key={p.id} className="flex items-center justify-between p-3.5 bg-gray-50/50 rounded-2xl border border-gray-100 hover:bg-white transition-all">
                            <div className="flex items-center gap-3">
                                <span className={`text-[9px] font-black px-2 py-0.5 rounded-lg uppercase ${isFinished ? 'bg-rose-50 text-rose-500 border border-rose-100' : 'bg-white text-gray-400 border border-gray-100'}`}>{p.stage}</span>
                                <div className="flex flex-col"><span className={`text-[13px] font-bold ${isFinished ? 'text-gray-400 line-through decoration-rose-300' : 'text-gray-700'}`}>{p.idea}</span>{p.period && <span className="text-[9px] text-gray-300 font-bold flex items-center gap-1 mt-0.5"><Icon name="Clock" size={8}/> {p.period}</span>}</div>
                            </div>
                            {isFinished ? <Icon name="Check" size={12} className="text-rose-400" /> : <Icon name="ChevronRight" size={12} className="text-gray-200" />}
                        </div>
                    )) : <p className="text-[11px] text-gray-300 italic px-4 py-2">프로젝트가 없습니다.</p>}
                </div>
            </div>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [error, setError] = useState(null);
            const [funnelData, setFunnelData] = useState({ free: [], retention: [] });
            const [monthlyRecords, setMonthlyRecords] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState('');
            const [editPeriod, setEditPeriod] = useState('');

            useEffect(() => {
                const initFirebase = setInterval(() => {
                    if (window.FirebaseBridge) {
                        clearInterval(initFirebase);
                        const { auth, db, appId, onSnapshot, doc, signInAnonymously } = window.FirebaseBridge;
                        
                        signInAnonymously(auth)
                            .then(() => {
                                setUser(auth.currentUser);
                                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'main'), (snap) => {
                                    if (snap.exists()) {
                                        const data = snap.data();
                                        setFunnelData(data.funnelData || { free: [], retention: [] });
                                        setMonthlyRecords(data.monthlyRecords || []);
                                    } else {
                                        const initial = {
                                            funnelData: {
                                                free: [{ id: 'f1', stage: '1회차', idea: '신규 가입 웰컴 쿠폰 발송', status: '진행 완료', period: '01.01~01.15' }],
                                                retention: [{ id: 'r1', stage: 'M1', idea: '첫 달 정기권 20% 할인', status: '진행 완료', period: '02.10~02.28' }]
                                            },
                                            monthlyRecords: [{ id: 1, month: '2026-03', firstRequest: 840, free3rdCVR: '25.1%', m3Retention: '58.8%', status: '진행 중' }]
                                        };
                                        window.FirebaseBridge.setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'main'), initial);
                                    }
                                }, (err) => {
                                    setError("데이터를 불러올 권한이 없습니다. Firestore 규칙을 확인하세요.");
                                });
                            })
                            .catch((err) => {
                                if(err.code === 'auth/operation-not-allowed') {
                                    setError("익명 로그인이 비활성화되어 있습니다. Firebase Console에서 활성화해주세요.");
                                } else {
                                    setError("로그인 에러: " + err.message);
                                }
                            });
                    }
                }, 500);
                return () => clearInterval(initFirebase);
            }, []);

            const saveToCloud = async (newFunnel, newRecords) => {
                if (!window.FirebaseBridge || !user) return;
                const { db, appId, setDoc, doc } = window.FirebaseBridge;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'main'), {
                    funnelData: newFunnel || funnelData,
                    monthlyRecords: newRecords || monthlyRecords
                });
            };

            const toggleStatus = (section, id) => {
                const cycle = ['대기', '진행 중', '진행 완료', '종료'];
                const updated = { ...funnelData, [section]: funnelData[section].map(i => i.id === id ? {...i, status: cycle[(cycle.indexOf(i.status)+1)%4]} : i) };
                setFunnelData(updated); saveToCloud(updated, null);
            };

            const startEditing = (id, curIdea, curPeriod) => { setEditingId(id); setEditValue(curIdea); setEditPeriod(curPeriod || ''); };
            const onSaveIdea = (section, id) => {
                const updated = { ...funnelData, [section]: funnelData[section].map(i => i.id === id ? { ...i, idea: editValue, period: editPeriod } : i) };
                setFunnelData(updated); saveToCloud(updated, null); setEditingId(null);
            };
            const onAddIdea = (section, stageName) => {
                const updated = { ...funnelData, [section]: [...funnelData[section], { id: Date.now().toString(), stage: stageName, idea: '', status: '대기', period: '' }] };
                setFunnelData(updated); saveToCloud(updated, null);
            };
            const onDeleteIdea = (section, id) => {
                const updated = { ...funnelData, [section]: funnelData[section].filter(i => i.id !== id) };
                setFunnelData(updated); saveToCloud(updated, null);
            };

            const totalReq = monthlyRecords.reduce((acc, curr) => acc + Number(curr.firstRequest || 0), 0);
            const parsePct = (val) => Number(String(val).replace('%','')) || 0;
            const avgFree = monthlyRecords.length > 0 ? monthlyRecords.reduce((acc, curr) => acc + parsePct(curr.free3rdCVR), 0) / monthlyRecords.length : 0;
            const avgM3 = monthlyRecords.length > 0 ? monthlyRecords.reduce((acc, curr) => acc + parsePct(curr.m3Retention), 0) / monthlyRecords.length : 0;

            if (error) return <div className="h-screen flex flex-col items-center justify-center bg-rose-50 text-rose-600 p-10 text-center font-bold">⚠️ 에러 발생<br/><br/>{error}</div>;
            if (!user) return <div className="h-screen flex flex-col items-center justify-center bg-[#F0F2F5] text-emerald-500 font-black"><div className="animate-bounce mb-4 text-4xl">L</div>데이터 금고 연결 중...</div>;

            return (
                <div className="min-h-screen p-6 lg:p-10">
                    <div className="min-w-[1200px] max-w-[1700px] mx-auto">
                        <header className="flex items-center justify-between mb-12">
                            <div className="flex items-center gap-6">
                                <div className="w-16 h-16 bg-emerald-500 rounded-[2rem] flex items-center justify-center text-white font-black text-4xl shadow-2xl">L</div>
                                <div><h1 className="text-3xl font-black tracking-tight text-gray-900 uppercase">Growth Dashboard</h1><p className="text-sm text-emerald-600 font-extrabold uppercase tracking-[0.4em]">Real-time Collaboration</p></div>
                            </div>
                            <div className="bg-white px-8 py-5 rounded-[2.5rem] shadow-xl flex items-center justify-between w-[340px]">
                                <div className="flex items-center gap-4"><Icon name="Calendar" size={24} className="text-emerald-500" /><div><p className="text-[11px] font-black text-gray-400 mb-1">ACTIVE MONTH</p><p className="text-2xl font-black text-emerald-500 tracking-tighter">2026.03</p></div></div>
                                <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div><span className="text-[10px] font-black text-emerald-500 uppercase italic">Online</span></div>
                            </div>
                        </header>

                        <div className="flex items-stretch gap-6 h-full mb-12">
                            <div className="w-[240px] bg-white/60 p-10 rounded-[48px] border border-white shadow-sm flex flex-col justify-center items-center text-center min-h-[1050px]">
                                <Icon name="Truck" size={36} className="text-emerald-500 mb-4" /><h3 className="text-lg font-black text-gray-800 mb-1 uppercase">1. 첫 수거신청</h3>
                                <div className="mb-10 font-black text-emerald-600 text-4xl tracking-tighter">{totalReq.toLocaleString()}</div>
                                <button onClick={() => window.open('https://docs.google.com/spreadsheets/', '_blank')} className="w-full py-4 bg-gray-900 text-white rounded-2xl text-[10px] font-black flex items-center justify-center gap-2 shadow-lg hover:bg-black transition-all font-montserrat uppercase"><Icon name="LayoutGrid" size={14} /> 실시간 시트</button>
                            </div>
                            <div className="flex items-center justify-center px-2"><Icon name="ChevronRight" size={28} className="text-gray-300" /></div>
                            <div className="flex-1 flex flex-col gap-6">
                                <div className="h-[512px] bg-white p-10 rounded-[48px] border border-emerald-100 shadow-2xl flex flex-col overflow-hidden">
                                    <div className="flex justify-between items-start mb-10"><div className="flex items-center gap-5"><div className="p-4 rounded-[1.5rem] bg-emerald-500 text-white shadow-lg"><Icon name="Zap" size={28} /></div><div><h3 className="text-2xl font-black text-gray-900 italic">2. 자유 이용 퍼널</h3><p className="text-[12px] text-emerald-600 font-black uppercase">N-Times Retention</p></div></div><div className="px-5 py-3 bg-emerald-600 text-white rounded-[1.5rem] font-black shadow-lg text-sm tracking-tighter">GOAL 25.6%</div></div>
                                    <div className="grid grid-cols-3 gap-6 flex-1 overflow-y-auto pr-2 custom-scrollbar pb-2">
                                        {['1회차', '2회차', '3회차'].map(s => (
                                            <div key={s} className="flex flex-col gap-3">
                                                {funnelData.free.filter(i => i.stage === s).map(i => <FunnelCard key={i.id} section="free" item={i} onToggleStatus={toggleStatus} onDelete={onDeleteIdea} onStartEdit={startEditing} isEditing={editingId === i.id} editValue={editValue} setEditValue={setEditValue} editPeriod={editPeriod} setEditPeriod={setEditPeriod} onSave={onSaveIdea} />)}
                                                <button onClick={() => onAddIdea('free', s)} className="w-full py-4 border-2 border-dashed border-emerald-100 rounded-[2rem] text-[10px] font-black text-emerald-300 hover:border-emerald-500 transition-all flex items-center justify-center gap-2 font-nanum uppercase tracking-tighter"><Icon name="PlusCircle" size={14} /> {s} IDEA</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="h-[512px] bg-[#1A1C1E] p-10 rounded-[48px] shadow-2xl flex flex-col overflow-hidden">
                                    <div className="flex justify-between items-start mb-10 shrink-0"><div className="flex items-center gap-5"><div className="p-4 rounded-[1.5rem] bg-blue-500 text-white shadow-lg"><Icon name="RotateCcw" size={28} /></div><div><h3 className="text-2xl font-black text-white italic">3. 구독 리텐션 퍼널</h3><p className="text-[12px] text-blue-400 font-black uppercase tracking-widest">Monthly Recurring</p></div></div><div className="px-5 py-3 bg-blue-600 text-white rounded-[1.5rem] font-black shadow-lg text-sm tracking-tighter">GOAL M3 59%</div></div>
                                    <div className="grid grid-cols-3 gap-6 flex-1 overflow-y-auto pr-2 custom-scrollbar pb-2">
                                        {['M1', 'M2', 'M3'].map(s => (
                                            <div key={s} className="flex flex-col gap-3">
                                                {funnelData.retention.filter(i => i.stage === s).map(i => <FunnelCard key={i.id} section="retention" item={i} isDark onToggleStatus={toggleStatus} onDelete={onDeleteIdea} onStartEdit={startEditing} isEditing={editingId === i.id} editValue={editValue} setEditValue={setEditValue} editPeriod={editPeriod} setEditPeriod={setEditPeriod} onSave={onSaveIdea} />)}
                                                <button onClick={() => onAddIdea('retention', s)} className="w-full py-4 border-2 border-dashed border-white/10 rounded-[2rem] text-[10px] font-black text-white/20 hover:border-blue-500 transition-all flex items-center justify-center gap-2 font-nanum uppercase tracking-tighter"><Icon name="PlusCircle" size={14} /> {s} IDEA</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
                            <div className="bg-white p-10 rounded-[48px] shadow-xl border border-blue-50 flex flex-col min-h-[400px]">
                                <div className="flex items-center gap-4 mb-10"><div className="p-3.5 rounded-2xl bg-blue-500 text-white shadow-lg"><Icon name="ListTodo" size={26} /></div><h3 className="text-xl font-black font-nanum">진행 중인 프로젝트</h3></div>
                                <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2">
                                    <ProjectList title="자유 이용 파트" items={funnelData.free.filter(i=>i.status==='진행 중')} badgeColor="bg-emerald-400" />
                                    <ProjectList title="구독 리텐션 파트" items={funnelData.retention.filter(i=>i.status==='진행 중')} badgeColor="bg-blue-400" />
                                </div>
                            </div>
                            <div className="bg-white p-10 rounded-[48px] shadow-xl border border-rose-50 flex flex-col min-h-[400px]">
                                <div className="flex items-center gap-4 mb-10"><div className="p-3.5 rounded-2xl bg-rose-500 text-white shadow-lg"><Icon name="Archive" size={26} /></div><h3 className="text-xl font-black text-rose-600 font-nanum">종료된 프로젝트</h3></div>
                                <div className="space-y-8 overflow-y-auto custom-scrollbar pr-2">
                                    <ProjectList title="자유 이용 파트" items={funnelData.free.filter(i=>i.status==='종료')} badgeColor="bg-rose-400" isFinished />
                                    <ProjectList title="구독 리텐션 파트" items={funnelData.retention.filter(i=>i.status==='종료')} badgeColor="bg-rose-400" isFinished />
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-10 rounded-[48px] shadow-xl border border-gray-100 mb-12">
                            <div className="flex justify-between items-center mb-8"><div className="flex items-center gap-4"><div className="p-3 rounded-2xl bg-emerald-50 text-emerald-600 shadow-sm border border-emerald-100"><Icon name="Calendar" size={24} /></div><h3 className="text-xl font-black font-nanum uppercase">월간 성과 아카이브</h3></div><button onClick={() => {
                                const updated = [...monthlyRecords, { id: Date.now(), month: '2026-MM', firstRequest: 0, free3rdCVR: '0%', m3Retention: '0%', status: '진행 중' }];
                                setMonthlyRecords(updated); saveToCloud(null, updated);
                            }} className="px-6 py-3 bg-emerald-500 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-emerald-600 transition-all">ADD MONTH</button></div>
                            <div className="overflow-x-auto"><table className="w-full text-left border-collapse font-montserrat">
                                <thead><tr className="border-b-2 border-gray-50 text-[11px] font-black text-gray-400 uppercase tracking-widest"><th className="py-4 px-4">MONTH</th><th className="py-4 px-4 italic">FIRST REQ</th><th className="py-4 px-4 italic">FREE 3RD CVR</th><th className="py-4 px-4 italic">M3 RETENTION</th><th className="py-4 px-4">STATUS</th><th className="py-4 px-4"></th></tr></thead>
                                <tbody className="text-sm font-bold text-gray-800">
                                    {monthlyRecords.map((r) => (
                                        <tr key={r.id} className="border-b border-gray-50 group hover:bg-gray-50/50 transition-colors">
                                            <td className="py-5 px-4"><input type="text" value={r.month} onChange={(e) => { const updated = monthlyRecords.map(rec => rec.id === r.id ? {...rec, month: e.target.value} : rec); setMonthlyRecords(updated); saveToCloud(null, updated); }} className="bg-transparent font-black outline-none w-24"/></td>
                                            <td className="py-5 px-4 text-emerald-600 font-bold"><input type="number" value={r.firstRequest} onChange={(e) => { const updated = monthlyRecords.map(rec => rec.id === r.id ? {...rec, firstRequest: e.target.value} : rec); setMonthlyRecords(updated); saveToCloud(null, updated); }} className="bg-transparent outline-none w-20"/> 건</td>
                                            <td className="py-5 px-4"><input type="text" value={r.free3rdCVR} onChange={(e) => { const updated = monthlyRecords.map(rec => rec.id === r.id ? {...rec, free3rdCVR: e.target.value} : rec); setMonthlyRecords(updated); saveToCloud(null, updated); }} className="bg-transparent outline-none w-16"/></td>
                                            <td className="py-5 px-4 text-blue-500"><input type="text" value={r.m3Retention} onChange={(e) => { const updated = monthlyRecords.map(rec => rec.id === r.id ? {...rec, m3Retention: e.target.value} : rec); setMonthlyRecords(updated); saveToCloud(null, updated); }} className="bg-transparent outline-none w-16"/></td>
                                            <td className="py-5 px-4"><span className={`px-3 py-1 rounded-full text-[10px] font-black ${r.status === '마감' ? 'bg-gray-100 text-gray-400' : 'bg-emerald-100 text-emerald-600 uppercase'}`}>{r.status}</span></td>
                                            <td className="py-5 px-4 text-right"><button onClick={() => { const updated = monthlyRecords.filter(rec => rec.id !== r.id); setMonthlyRecords(updated); saveToCloud(null, updated); }} className="p-2 text-gray-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="Trash2" size={16} /></button></td>
                                        </tr>
                                    ))}
                                </tbody>
                                <tfoot className="bg-gray-50/80 border-t-2 border-gray-100 font-black">
                                    <tr>
                                        <td className="py-5 px-4 text-gray-400 text-[11px] uppercase tracking-widest">TOTAL / AVG</td>
                                        <td className="py-5 px-4 text-emerald-600 text-lg font-montserrat">{totalReq.toLocaleString()} 건</td>
                                        <td className="py-5 px-4 text-gray-900 font-montserrat">{avgFree.toFixed(1)}%</td>
                                        <td className="py-5 px-4 text-blue-500 font-montserrat">{avgM3.toFixed(1)}%</td>
                                        <td colSpan="2" className="text-right px-4 text-[10px] text-gray-300 font-bold font-montserrat uppercase italic tracking-tighter">Sync Ready</td>
                                    </tr>
                                </tfoot>
                            </table></div>
                        </div>

                        <div className="mt-8 flex justify-between items-center px-8 border-t border-gray-200 pt-12 opacity-40 pb-12">
                            <div className="flex items-center gap-5 italic font-black text-gray-400 text-xs tracking-widest uppercase font-montserrat">
                                <Icon name="BarChart3" size={18} /> LaundryGo Strategy Map v7.0 (Real-time Cloud)
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
